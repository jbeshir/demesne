name: govulncheck

on:
  push:
  schedule:
    - cron: '17 2 * * *'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
